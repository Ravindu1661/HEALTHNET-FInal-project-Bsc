name: HEALTHNET CI (MySQL)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: healthnet_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. Repo checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. PHP setup (Laravel + MySQL)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      # 3. Composer dependencies
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      # 4. Env file + app key
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # 5. Config cache clear
      - name: Clear config cache
        run: php artisan config:clear

      # 6. Run database migrations on MySQL service
      - name: Run migrations
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: healthnet_test
          DB_USERNAME: root
          DB_PASSWORD: root

      # 7. Run Laravel/Pest tests
      - name: Run tests
        run: php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: healthnet_test
          DB_USERNAME: root
          DB_PASSWORD: root
